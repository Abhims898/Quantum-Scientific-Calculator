<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Scientific Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 30px;
    min-height: 100vh;
    align-items: center;
}

.calculator {
    background: rgba(20,20,40,0.95);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px #ffcc00;
    width: 480px;
    text-align: center;
    animation: glow 2s infinite alternate;
}

h1 {
    color: #ffcc00;
    text-shadow: 0 0 8px #ffcc00;
}

input[type="text"], select {
    width: calc(100% - 20px);
    padding: 12px;
    margin: 12px 0;
    border-radius: 10px;
    border: none;
    font-size: 1.1em;
    outline: none;
    box-shadow: 0 0 8px #ffcc00 inset;
    background: rgba(0,0,0,0.6);
    color: #fff;
}

button {
    background: #ffcc00;
    border: none;
    padding: 12px 20px;
    margin: 5px;
    font-size: 1.1em;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
    box-shadow: 0 0 10px #ffcc00;
}

button:hover {
    background: #ff9900;
    box-shadow: 0 0 20px #ff9900;
}

#result {
    margin-top: 20px;
    font-size: 1.2em;
    min-height: 50px;
    word-wrap: break-word;
}

#quantum-plot {
    margin-top: 15px;
    max-width: 100%;
    border-radius: 12px;
    border: 1px solid #ffcc00;
    display: none;
}

.quantum-controls {
    margin-top: 15px;
    background: rgba(50,50,80,0.8);
    padding: 15px;
    border-radius: 12px;
}

@keyframes glow {
    from { box-shadow: 0 0 20px #ffcc00; }
    to { box-shadow: 0 0 40px #ff9900; }
}
</style>
</head>
<body>
<div class="calculator">
    <h1>Quantum Scientific Calculator</h1>

    <input type="text" id="expression" placeholder="Enter expression">

    <select id="mode">
        <option value="scientific">Scientific</option>
        <option value="complex">Complex</option>
        <option value="matrix">Matrix</option>
        <option value="quantum">Quantum</option>
        <option value="memory">Memory</option>
    </select>

    <div class="quantum-controls" id="quantum-controls" style="display:none;">
        <label>Qubits: <input type="number" id="num_qubits" value="2" min="1" max="5"></label>
        <div style="margin-top:10px;">
            <button onclick="addGate('h')">H</button>
            <button onclick="addGate('x')">X</button>
            <button onclick="addGate('y')">Y</button>
            <button onclick="addGate('z')">Z</button>
            <button onclick="addGate('cx')">CX</button>
            <button onclick="addGate('ccx')">CCX</button>
            <button onclick="addGate('measure')">Measure</button>
        </div>
    </div>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
    <img id="quantum-plot" src="" alt="Quantum Circuit Plot">

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
