<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quantum Scientific Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="calculator">
        <h2>Quantum Scientific Calculator</h2>
        <input type="text" id="expression" placeholder="Enter expression">
        
        <select id="mode">
            <option value="scientific">Scientific</option>
            <option value="complex">Complex</option>
            <option value="matrix">Matrix</option>
            <option value="quantum">Quantum</option>
            <option value="memory">Memory</option>
        </select>

        <select id="action" style="display:none;">
            <option value="M+">M+</option>
            <option value="M-">M-</option>
            <option value="MR">MR</option>
        </select>

        <textarea id="quantumData" placeholder='Quantum JSON: [{"gate":"h","qubits":[0]}, {"gate":"measure","qubits":[0]}]' style="display:none;"></textarea>
        <input type="number" id="num_qubits" placeholder="Number of qubits" value="1" style="display:none;">

        <button onclick="calculate()">Calculate</button>
        <div id="result"></div>
        <img id="qc_plot" style="display:none;" />
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
