<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Scientific Calculator</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h1>Quantum Scientific Calculator</h1>

<div class="calculator">
    <input type="text" id="a" placeholder="A">
    <input type="text" id="b" placeholder="B">
    <input type="text" id="value" placeholder="Value for memory">

    <button onclick="calculate('+')">+</button>
    <button onclick="calculate('-')">-</button>
    <button onclick="calculate('*')">*</button>
    <button onclick="calculate('/')">/</button>
    <button onclick="calculate('^')">^</button>
    <button onclick="calculate('sin')">sin</button>
    <button onclick="calculate('cos')">cos</button>
    <button onclick="calculate('tan')">tan</button>
    <button onclick="calculate('log')">log</button>
    <button onclick="calculate('sqrt')">sqrt</button>
    <button onclick="calculate('M+')">M+</button>
    <button onclick="calculate('M-')">M-</button>
    <button onclick="calculate('MR')">MR</button>
    <button onclick="calculate('quantum')">Quantum</button>

    <h2>Matrix Operations</h2>
    <div id="matrixEditor">
        <table id="matrixA" class="matrix"></table>
        <table id="matrixB" class="matrix"></table>
        <button onclick="addRow('matrixA')">Add Row A</button>
        <button onclick="addCol('matrixA')">Add Col A</button>
        <button onclick="addRow('matrixB')">Add Row B</button>
        <button onclick="addCol('matrixB')">Add Col B</button>
        <button onclick="calculate('mat_add')">A + B</button>
        <button onclick="calculate('mat_sub')">A - B</button>
        <button onclick="calculate('mat_mul')">A × B</button>
    </div>

    <h2>Result:</h2>
    <div id="result"></div>
</div>

<h2>History:</h2>
<ul id="historyList"></ul>

<canvas id="quantumCanvas" width="500" height="100"></canvas>

<script src="/static/script.js"></script>
</body>
</html>
